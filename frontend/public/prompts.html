<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompts Admin - AI Tutor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background-color: #111827;
            color: #e5e7eb;
            overflow-x: hidden;
        }

        #root {
            width: 100%;
            min-height: 100vh;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 1rem;
        }

        /* Password Modal */
        .password-modal {
            background-color: #1f2937;
            border-radius: 0.5rem;
            padding: 2rem;
            max-width: 28rem;
            width: 100%;
        }

        .password-modal h2 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            color: white;
        }

        .password-modal label {
            display: block;
            color: #d1d5db;
            margin-bottom: 0.5rem;
        }

        .password-modal input {
            width: 100%;
            padding: 0.5rem 1rem;
            background-color: #374151;
            color: white;
            border: 1px solid #4b5563;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
        }

        .password-modal input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .password-error {
            color: #f87171;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .btn-primary {
            width: 100%;
            background-color: #2563eb;
            color: white;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: #1d4ed8;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Container */
        .prompts-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Header */
        .prompts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .prompts-header h1 {
            font-size: 1.875rem;
            font-weight: bold;
            color: white;
            margin-bottom: 0.5rem;
        }

        .prompts-header p {
            color: #9ca3af;
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn-secondary {
            padding: 0.5rem 1rem;
            background-color: #374151;
            color: white;
            font-weight: 600;
            border-radius: 0.375rem;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-secondary:hover {
            background-color: #4b5563;
        }

        /* Loading */
        .loading-container {
            text-align: center;
            padding: 3rem 0;
        }

        .loading-spinner {
            display: inline-block;
            font-size: 2.25rem;
            color: #3b82f6;
            margin-bottom: 1rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Category Section */
        .category-section {
            margin-bottom: 2rem;
        }

        .category-header {
            font-size: 1.25rem;
            font-weight: bold;
            color: white;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .category-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .category-badge.chat {
            background-color: #dbeafe;
            color: #1e40af;
        }

        .category-badge.analysis {
            background-color: #e9d5ff;
            color: #6b21a8;
        }

        .category-badge.report {
            background-color: #d1fae5;
            color: #065f46;
        }

        .category-badge.material {
            background-color: #fed7aa;
            color: #92400e;
        }

        .category-count {
            color: #6b7280;
            font-size: 0.875rem;
        }

        /* Prompts Grid */
        .prompts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        @media (min-width: 1024px) {
            .prompts-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .prompt-card {
            background-color: #1f2937;
            border: 1px solid #374151;
            border-radius: 0.5rem;
            padding: 1.5rem;
            transition: border-color 0.2s;
        }

        .prompt-card:hover {
            border-color: #4b5563;
        }

        .prompt-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .prompt-card h3 {
            font-size: 1.125rem;
            font-weight: 600;
            color: white;
        }

        .btn-edit {
            padding: 0.25rem 0.75rem;
            background-color: #2563eb;
            color: white;
            font-size: 0.875rem;
            font-weight: 600;
            border-radius: 0.375rem;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-edit:hover {
            background-color: #1d4ed8;
        }

        .prompt-description {
            color: #9ca3af;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .prompt-preview {
            background-color: #111827;
            padding: 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            color: #d1d5db;
            font-family: 'Courier New', monospace;
            margin-bottom: 0.75rem;
            max-height: 8rem;
            overflow-y: auto;
        }

        .prompt-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: #6b7280;
        }

        /* Editor Modal */
        .editor-modal {
            background-color: #1f2937;
            border-radius: 0.5rem;
            width: 95vw;
            max-width: 90rem;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .editor-header {
            padding: 1.5rem;
            border-bottom: 1px solid #374151;
        }

        .editor-header-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .editor-title {
            flex: 1;
        }

        .editor-title h2 {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            margin-bottom: 0.5rem;
        }

        .editor-description {
            color: #9ca3af;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .editor-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.875rem;
            color: #6b7280;
        }

        .btn-close {
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 2rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
        }

        .btn-close:hover {
            color: white;
        }

        .editor-body {
            flex: 1;
            padding: 1.5rem;
            overflow: hidden;
        }

        .editor-textarea {
            width: 100%;
            height: 100%;
            min-height: 400px;
            background-color: #111827;
            color: white;
            padding: 1rem;
            border: 1px solid #374151;
            border-radius: 0.375rem;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            resize: vertical;
        }

        .editor-textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .editor-footer {
            padding: 1.5rem;
            border-top: 1px solid #374151;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-char-count {
            font-size: 0.875rem;
            color: #6b7280;
        }

        .editor-actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn-cancel {
            padding: 0.5rem 1.5rem;
            background-color: #374151;
            color: white;
            font-weight: 600;
            border-radius: 0.375rem;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-cancel:hover {
            background-color: #4b5563;
        }

        .btn-save {
            padding: 0.5rem 1.5rem;
            background-color: #2563eb;
            color: white;
            font-weight: 600;
            border-radius: 0.375rem;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-save:hover:not(:disabled) {
            background-color: #1d4ed8;
        }

        .btn-save:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 50;
            animation: toastFadeIn 0.3s ease-out;
        }

        .toast-content {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            color: white;
            font-weight: 500;
        }

        .toast-success {
            background-color: #059669;
        }

        .toast-error {
            background-color: #dc2626;
        }

        @keyframes toastFadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- Password Modal (initially hidden, shown by JS if needed) -->
        <div id="passwordModal" class="modal-overlay hidden">
            <div class="password-modal">
                <h2>Admin Zugang</h2>
                <form id="loginForm">
                    <label>Passwort:</label>
                    <input type="password" id="passwordInput" placeholder="Passwort eingeben..." autofocus>
                    <p id="passwordError" class="password-error hidden"></p>
                    <button type="submit" class="btn-primary" id="loginBtn">Einloggen</button>
                </form>
            </div>
        </div>

        <!-- Main Content -->
        <div id="mainContent" class="hidden">
            <div class="prompts-container">
                <!-- Header -->
                <div class="prompts-header">
                    <div>
                        <h1>System Prompts</h1>
                        <p>Alle System-Prompts verwalten und bearbeiten</p>
                    </div>
                    <div class="header-actions">
                        <button id="reloadBtn" class="btn-secondary">⟳ Neu laden</button>
                        <button id="logoutBtn" class="btn-secondary">Logout</button>
                    </div>
                </div>

                <!-- Loading -->
                <div id="loadingContainer" class="loading-container">
                    <div class="loading-spinner">⟳</div>
                    <p>Lade Prompts...</p>
                </div>

                <!-- Prompts Container -->
                <div id="promptsContainer"></div>
            </div>
        </div>

        <!-- Editor Modal -->
        <div id="editorModal" class="modal-overlay hidden">
            <div class="editor-modal">
                <div class="editor-header">
                    <div class="editor-header-content">
                        <div class="editor-title">
                            <h2 id="editorTitle"></h2>
                            <p id="editorDescription" class="editor-description"></p>
                            <div id="editorMeta" class="editor-meta"></div>
                        </div>
                        <button id="editorCloseBtn" class="btn-close">×</button>
                    </div>
                </div>
                <div class="editor-body">
                    <textarea id="editorTextarea" class="editor-textarea"></textarea>
                </div>
                <div class="editor-footer">
                    <div class="editor-char-count" id="charCount">0 Zeichen</div>
                    <div class="editor-actions">
                        <button id="editorCancelBtn" class="btn-cancel">Abbrechen</button>
                        <button id="editorSaveBtn" class="btn-save">Speichern</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast" class="toast hidden">
            <div id="toastContent" class="toast-content"></div>
        </div>
    </div>

    <script src="/prompts-admin.js"></script>
</body>
</html>
